<!-- loading.html -->
@if (isLoading()) {
<div class="fixed inset-0 bg-[rgba(0,0,0,0.7)] w-full h-full flex justify-center items-center z-50">
  <div class="text-center">
    <i class="fas fa-square fa-bounce text-6xl text-custom-green"></i>
    <div class="bg-white rounded-md p-1 mt-3">
      <img src="./images/freshcart-logo.svg" alt="logo" />
    </div>
  </div>
</div>
}
