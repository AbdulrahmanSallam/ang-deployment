<section class="w-full my-16 md:my-24">
  <main class="container">
    <!-- Loading State -->
    @if (showLoading()) {
    <div class="loading text-center py-16">
      <i class="fas fa-spinner fa-spin fa-3x text-primary mb-4"></i>
      <p class="text-lg">Loading product details...</p>
    </div>
    }

    <!-- Error State -->
    @if (showError()) {
    <div class="error text-center py-16">
      <i class="fas fa-exclamation-triangle fa-3x text-red-500 mb-4"></i>
      <h3 class="text-xl font-bold text-red-600 mb-2">Product Not Found</h3>
      <p class="text-red-600 mb-6">{{ error() }}</p>
      <button
        (click)="retryLoading()"
        class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-primary-dark transition-colors"
      >
        Try Again
      </button>
    </div>
    }

    <!-- Empty State (Fallback) -->
    @if (showEmpty()) {
    <div class="empty text-center py-16">
      <i class="fas fa-box-open fa-3x text-gray-400 mb-4"></i>
      <h3 class="text-xl font-bold text-gray-600 mb-2">Product Not Available</h3>
      <p class="text-gray-600">The product you're looking for is not available.</p>
    </div>
    }

    <!-- Content State -->
    @if (showContent()) {
    <div class="flex flex-wrap md:flex-nowrap items-center gap-10">
      <div class="max-w-[220px] w-full mx-auto">
        <app-product-slider [productInfo]="product()" />
      </div>

      <article class="flex-grow">
        <h2 class="text-xl font-extrabold">{{ product().title }}</h2>
        <p class="my-4 indent-2 text-lg font-light">
          {{ product().description }}
        </p>
        <app-rating [ratingAverage]="product().ratingsAverage" />
        <app-product-price [price]="product().price" />
        <div class="flex items-center gap-6 w-full">
          <div class="flex-grow">
            <app-add-to-cart-btn [productId]="product()._id"></app-add-to-cart-btn>
          </div>
          <div>
            <app-add-to-wishlist [product]="product()" />
          </div>
        </div>
      </article>
    </div>
    }
  </main>
</section>
